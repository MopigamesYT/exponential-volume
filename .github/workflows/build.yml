name: Build Geode Mod

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - { name: Windows, os: ubuntu-24.04, target: Win64 }
          - { name: macOS, os: macos-latest, target: MacOS }
          - { name: Android32, os: ubuntu-24.04, target: Android32 }
          - { name: Android64, os: ubuntu-24.04, target: Android64 }

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 19
        if: matrix.config.target == 'Win64'
        run: |
          wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s -- 19
          sudo ln -sf /usr/bin/clang-19 /usr/bin/clang
          sudo ln -sf /usr/bin/clang++-19 /usr/bin/clang++
          sudo ln -sf /usr/bin/lld-19 /usr/bin/lld
          sudo ln -sf /usr/bin/lld-link-19 /usr/bin/lld-link
          sudo ln -sf /usr/bin/llvm-rc-19 /usr/bin/llvm-rc
          clang --version

      - name: Build mod
        uses: geode-sdk/build-geode-mod@main
        with:
          target: ${{ matrix.config.target }}
          combine: true

  package:
    name: Package builds
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: geode-sdk/build-geode-mod/combine@main
        id: build

      - uses: actions/upload-artifact@v4
        with:
          name: Build Output
          path: ${{ steps.build.outputs.build-output }}
