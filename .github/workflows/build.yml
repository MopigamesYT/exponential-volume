name: Build Geode Mod

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - { name: Windows, os: ubuntu-latest, platform: win }
          - { name: macOS, os: macos-latest, platform: mac }
          - { name: Android32, os: ubuntu-latest, platform: android32 }
          - { name: Android64, os: ubuntu-latest, platform: android64 }

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Build mod
        uses: geode-sdk/build-geode-mod@main
        with:
          platform: ${{ matrix.config.platform }}
          combine: true

  package:
    name: Package builds
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: geode-sdk/build-geode-mod/combine@main
        id: build

      - uses: actions/upload-artifact@v4
        with:
          name: Build Output
          path: ${{ steps.build.outputs.build-output }}
