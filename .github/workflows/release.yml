name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - { name: Windows, os: windows-latest, target: Win64 }
          - { name: macOS, os: macos-latest, target: MacOS }
          - { name: Android32, os: ubuntu-latest, target: Android32 }
          - { name: Android64, os: ubuntu-latest, target: Android64 }

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Build mod
        uses: geode-sdk/build-geode-mod@main
        with:
          target: ${{ matrix.config.target }}
          combine: true

  package:
    name: Package and upload
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: geode-sdk/build-geode-mod/combine@main
        id: build

      - uses: actions/upload-artifact@v4
        with:
          name: Build Output
          path: ${{ steps.build.outputs.build-output }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.build.outputs.build-output }}/*.geode
